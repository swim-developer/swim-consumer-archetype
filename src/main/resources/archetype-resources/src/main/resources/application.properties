#set( $d = '$' )
# =============================================================================
# SWIM ${serviceDisplayName} Consumer - Common Configuration (All Profiles)
# =============================================================================

quarkus.application.name=swim-${serviceName}-consumer
swim.service.name=${serviceName}
swim.subscriptions=${d}{${serviceName}.subscriptions:[]}
swim.subscriptions.command-type=${package}.domain.model.command.SubscriptionCommand

# =============================================================================
# MongoDB Configuration
# =============================================================================
quarkus.mongodb.database=${d}{MONGODB_DATABASE:swim-${serviceName}}
quarkus.mongodb.max-pool-size=${d}{MONGODB_MAX_POOL_SIZE:50}
quarkus.mongodb.min-pool-size=${d}{MONGODB_MIN_POOL_SIZE:5}
quarkus.mongodb.max-connection-idle-time=60s
quarkus.mongodb.connect-timeout=10s
quarkus.mongodb.read-timeout=60s
quarkus.mongodb.server-selection-timeout=10000
quarkus.mongodb.health.enabled=false

# =============================================================================
# SWIM Providers (Multi-Provider Support)
# =============================================================================
swim.providers=${d}{SWIM_PROVIDERS:[{"providerId":"default","subscriptionManager":{"url":"http://localhost:8081","tls":null,"resilience":{"connectTimeoutMs":0,"readTimeoutMs":0,"retryMaxAttempts":0,"retryDelayMs":0}},"amqpBroker":{"host":"localhost","port":5672,"sslEnabled":false,"username":"admin","password":"admin","tls":null}}]}

# =============================================================================
# Subscriptions
# =============================================================================
${serviceName}.subscriptions.delete-and-recreate=${d}{SUBSCRIPTIONS_DELETE_AND_RECREATE:true}
swim.subscriptions.delete-and-recreate=${d}{SUBSCRIPTIONS_DELETE_AND_RECREATE:true}

# =============================================================================
# Reconciliation
# =============================================================================
reconciliation.retry.interval=${d}{RECONCILIATION_RETRY_INTERVAL:10s}
reconciliation.retry.initial-delay=${d}{RECONCILIATION_RETRY_INITIAL_DELAY:30s}
swim.subscription.filter-cache.refresh-interval-cycles=${d}{SWIM_FILTER_CACHE_REFRESH_CYCLES:0}

# =============================================================================
# Subscription Renewal
# =============================================================================
swim.subscription.renewal.enabled=${d}{SWIM_RENEWAL_ENABLED:true}
swim.subscription.renewal.check-interval=${d}{SWIM_RENEWAL_CHECK_INTERVAL:5m}
swim.subscription.renewal.threshold=${d}{SWIM_RENEWAL_THRESHOLD:1h}
swim.subscription.renewal.retry-count=${d}{SWIM_RENEWAL_RETRY_COUNT:3}

# =============================================================================
# Validation
# =============================================================================
swim.validation.enabled=${d}{SWIM_VALIDATION_ENABLED:true}
swim.validation.fail-on-nullbody=${d}{SWIM_VALIDATION_FAIL_ON_NULLBODY:false}

# =============================================================================
# Kafka Configuration
# =============================================================================
kafka.batch.size=${d}{KAFKA_BATCH_SIZE:65536}
kafka.linger.ms=${d}{KAFKA_LINGER_MS:5}
kafka.buffer.memory=${d}{KAFKA_BUFFER_MEMORY:67108864}

# =============================================================================
# Kafka Outgoing Channels
# =============================================================================
mp.messaging.outgoing.out-events.connector=smallrye-kafka
mp.messaging.outgoing.out-events.topic=${serviceName}-events-topic
mp.messaging.outgoing.out-events.compression.type=lz4
mp.messaging.outgoing.out-events.acks=1
mp.messaging.outgoing.out-events.max-inflight-messages=${d}{KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-events.buffer-size=${d}{KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-events.waitForWriteCompletion=false
mp.messaging.outgoing.out-events.tracing-enabled=true

mp.messaging.outgoing.out-dlq.connector=smallrye-kafka
mp.messaging.outgoing.out-dlq.topic=${serviceName}-events-dlq-topic
mp.messaging.outgoing.out-dlq.compression.type=lz4
mp.messaging.outgoing.out-dlq.acks=1
mp.messaging.outgoing.out-dlq.max-inflight-messages=${d}{KAFKA_MAX_INFLIGHT:0}
mp.messaging.outgoing.out-dlq.buffer-size=${d}{KAFKA_BUFFER_SIZE:2048}
mp.messaging.outgoing.out-dlq.waitForWriteCompletion=false
mp.messaging.outgoing.out-dlq.tracing-enabled=true

# =============================================================================
# Kafka Inbox Store
# =============================================================================
mp.messaging.outgoing.swim-inbox.topic=${d}{INBOX_TOPIC:${serviceName}-inbox-topic}

# =============================================================================
# Kafka Inbox Consumer
# =============================================================================
mp.messaging.incoming.in-${serviceName}-inbox.connector=smallrye-kafka
mp.messaging.incoming.in-${serviceName}-inbox.topic=${d}{INBOX_TOPIC:${serviceName}-inbox-topic}
mp.messaging.incoming.in-${serviceName}-inbox.group.id=${d}{INBOX_GROUP:${serviceName}-inbox-consumer}
mp.messaging.incoming.in-${serviceName}-inbox.batch=true
mp.messaging.incoming.in-${serviceName}-inbox.auto.offset.reset=earliest
mp.messaging.incoming.in-${serviceName}-inbox.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.in-${serviceName}-inbox.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.in-${serviceName}-inbox.failure-strategy=ignore
mp.messaging.incoming.in-${serviceName}-inbox.commit-strategy=throttled
mp.messaging.incoming.in-${serviceName}-inbox.auto.commit.interval.ms=${d}{KAFKA_INBOX_COMMIT_INTERVAL:2000}
mp.messaging.incoming.in-${serviceName}-inbox.max.poll.records=${d}{KAFKA_INBOX_MAX_POLL:500}
mp.messaging.incoming.in-${serviceName}-inbox.fetch.min.bytes=${d}{KAFKA_INBOX_FETCH_MIN:1}
mp.messaging.incoming.in-${serviceName}-inbox.fetch.max.wait.ms=${d}{KAFKA_INBOX_FETCH_MAX_WAIT:100}
mp.messaging.incoming.in-${serviceName}-inbox.concurrency=${d}{KAFKA_INBOX_CONCURRENCY:20}
mp.messaging.incoming.in-${serviceName}-inbox.tracing-enabled=true

# =============================================================================
# Per-Subscription Heartbeat Monitor
# =============================================================================
swim.heartbeat.monitor.enabled=true
swim.heartbeat.monitor.check-interval=15s
swim.heartbeat.monitor.tolerance=30s

# =============================================================================
# SSL/TLS
# =============================================================================
quarkus.ssl.native=true

# =============================================================================
# REST Client
# =============================================================================
quarkus.rest-client.logging.scope=none
quarkus.rest-client.logging.body-limit=0

# =============================================================================
# Fault Tolerance
# =============================================================================
swim.subscription.api.timeout=${d}{SWIM_SUBSCRIPTION_API_TIMEOUT:30000}
swim.subscription.api.max-retries=${d}{SWIM_SUBSCRIPTION_API_MAX_RETRIES:3}
swim.subscription.api.retry-delay=${d}{SWIM_SUBSCRIPTION_API_RETRY_DELAY:1000}
swim.subscription.api.max-duration=${d}{SWIM_SUBSCRIPTION_API_MAX_DURATION:120000}

# =============================================================================
# Schedulers
# =============================================================================
swim.scheduler.initial-delay=${d}{SWIM_SCHEDULER_INITIAL_DELAY:30s}

# =============================================================================
# AMQP Batch
# =============================================================================
swim.amqp.max-buffered-messages=${d}{SWIM_AMQP_MAX_BUFFERED_MESSAGES:50}
swim.inbox.batch.size=${d}{INBOX_BATCH_SIZE:50}
swim.inbox.batch.flush-interval-ms=${d}{INBOX_BATCH_FLUSH_MS:50}

# =============================================================================
# Outbox Recovery
# =============================================================================
swim.outbox.recovery.interval=${d}{SWIM_OUTBOX_RECOVERY_INTERVAL:30s}
swim.outbox.recovery.batch-size=${d}{SWIM_OUTBOX_RECOVERY_BATCH_SIZE:100}
swim.outbox.cleanup.interval=${d}{SWIM_OUTBOX_CLEANUP_INTERVAL:5m}
swim.outbox.cleanup.batch-size=${d}{SWIM_OUTBOX_CLEANUP_BATCH_SIZE:500}
swim.outbox.max-retries=${d}{SWIM_OUTBOX_MAX_RETRIES:5}

# =============================================================================
# Idempotency Cache
# =============================================================================
swim.idempotency.cache-name=processed-messages
quarkus.cache.caffeine."processed-messages".maximum-size=${d}{SWIM_IDEMPOTENCY_CACHE_SIZE:100000}
quarkus.cache.caffeine."processed-messages".expire-after-write=${d}{SWIM_IDEMPOTENCY_CACHE_TTL:24H}
quarkus.cache.caffeine."processed-messages".metrics-enabled=true

# =============================================================================
# OpenAPI
# =============================================================================
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.management.enabled=false
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=SWIM ${serviceDisplayName} Consumer API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Internal API for managing ${serviceDisplayName} subscriptions and messages
mp.openapi.extensions.smallrye.info.contact.name=SWIM Developer Team

# =============================================================================
# Vert.x / Threading
# =============================================================================
quarkus.vertx.prefer-native-transport=true
quarkus.vertx.max-worker-execute-time=30s
quarkus.vertx.worker-pool-size=${d}{VERTX_WORKER_POOL_SIZE:100}
quarkus.virtual-threads.enabled=false
quarkus.thread-pool.max-threads=${d}{THREAD_POOL_MAX_THREADS:250}
quarkus.thread-pool.queue-size=1000
quarkus.banner.enabled=true

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.category."com.github.swim_developer".level=INFO
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.category."org.apache.kafka".level=WARN
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c] (%t) %s%e%n
quarkus.log.console.async.enabled=true
quarkus.log.console.async.queue-length=10000
quarkus.log.console.async.overflow=DISCARD

# =============================================================================
# OpenTelemetry
# =============================================================================
quarkus.otel.enabled=${d}{OTEL_ENABLED:true}
quarkus.otel.sdk.disabled=${d}{OTEL_SDK_DISABLED:false}
quarkus.otel.exporter.otlp.endpoint=${d}{OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.exporter.otlp.headers=${d}{OTEL_HEADERS:}
quarkus.otel.resource.attributes=service.name=swim-${serviceName}-consumer,service.version=1.0.0,k8s.namespace.name=${d}{POD_NAMESPACE:unknown}

# =============================================================================
# Prometheus Metrics
# =============================================================================
quarkus.management.enabled=true
quarkus.micrometer.enabled=${d}{PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${d}{PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.path=/q/metrics
